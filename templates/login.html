<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Giriş - RequiemHBYS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="card login-card p-4">
    <div class="text-center mb-3">
      <i class="bi bi-hospital" style="font-size:2.5rem;color:#123a54;"></i>
      <h4 class="mt-2 mb-0 fw-bold" style="color:#123a54;">REQUIEM HBYS</h4>
      <small class="text-muted">Hastane Bilgi Yönetim Sistemi</small>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'danger' if cat=='error' else cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Kullanıcı Adı</label>
        <input type="text" name="kullanici_adi" class="form-control" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label">Şifre</label>
        <input type="password" name="sifre" class="form-control" required>
      </div>
      <button class="btn btn-primary w-100" style="background:#123a54;border-color:#123a54;">Giriş Yap</button>
    </form>
    <p class="text-center text-muted mt-3 small">Demo giriş: <strong>admin / 1234</strong> veya <strong>temel.bulut / 1234</strong></p>
  </div>
</div>
</body>
</html>

{% extends "base.html" %}
{% block title %}Yeni Randevu{% endblock %}
{% block page_header %}Yeni Randevu{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:650px;">
  <form method="post" action="{{ url_for('randevu_kaydet') }}">
    <div class="mb-3">
      <label class="form-label">Hasta *</label>
      <select class="form-select" name="hasta_id" required>
        <option value="">Seçiniz</option>
        {% for h in hastalar %}<option value="{{ h.id }}">{{ h.ad_soyad }}</option>{% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Doktor *</label>
      <select class="form-select" name="doktor_id" required>
        <option value="">Seçiniz</option>
        {% for d in doktorlar %}<option value="{{ d.id }}">{{ d.ad_soyad }} ({{ d.poliklinik }})</option>{% endfor %}
      </select>
    <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Tarih *</label>
                <input type="date" class="form-control" name="tarih" onclick="this.showPicker()" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Saat *</label>
                <input type="time" class="form-control" name="saat" onclick="this.showPicker()" required>
            </div>
        </div>
    <div class="mt-4">
      <button class="btn btn-success"><i class="bi bi-check-circle"></i> Randevu Oluştur</button>
      <a href="{{ url_for('randevular') }}" class="btn btn-secondary">Vazgeç</a>
    </div>
  </form>
</div>
{% endblock %}
